<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Variant 6: Classic Belarusian romb/lozenge pattern (like on the flag ornament) -->
  <rect width="32" height="32" rx="3" fill="#fff"/>
  <!-- Large central diamond -->
  <polygon points="16,2 30,16 16,30 2,16" fill="none" stroke="#cc2229" stroke-width="2"/>
  <!-- Inner diamond -->
  <polygon points="16,8 24,16 16,24 8,16" fill="none" stroke="#cc2229" stroke-width="1.5"/>
  <!-- Center cross -->
  <rect x="14" y="12" width="4" height="8" fill="#cc2229"/>
  <rect x="12" y="14" width="8" height="4" fill="#cc2229"/>
  <!-- Corner triangles (like flag ornament) -->
  <polygon points="16,2 20,6 16,8 12,6" fill="#cc2229" opacity="0.3"/>
  <polygon points="30,16 26,20 24,16 26,12" fill="#cc2229" opacity="0.3"/>
  <polygon points="16,30 12,26 16,24 20,26" fill="#cc2229" opacity="0.3"/>
  <polygon points="2,16 6,12 8,16 6,20" fill="#cc2229" opacity="0.3"/>
</svg>
